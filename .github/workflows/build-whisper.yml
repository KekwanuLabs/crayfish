name: Build Whisper Binaries

# Build whisper.cpp for all supported platforms and upload as release assets.
# These pre-built binaries allow Crayfish to enable voice recognition instantly
# without requiring users to compile from source.

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      whisper_version:
        description: 'Whisper.cpp version/tag to build'
        required: false
        default: 'master'
  schedule:
    # Rebuild weekly to pick up whisper.cpp updates
    - cron: '0 0 * * 0'

env:
  WHISPER_REPO: https://github.com/ggerganov/whisper.cpp.git

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ git

      - name: Clone whisper.cpp
        run: git clone --depth 1 ${{ env.WHISPER_REPO }} whisper.cpp

      - name: Build whisper
        run: |
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package binary
        run: |
          mkdir -p dist
          cp whisper.cpp/build/bin/whisper-cli dist/whisper 2>/dev/null || cp whisper.cpp/build/bin/main dist/whisper
          chmod +x dist/whisper
          tar -czvf whisper-linux-amd64.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-linux-amd64
          path: whisper-linux-amd64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 -v $PWD:/work -w /work arm64v8/debian:bookworm bash -c '
            apt-get update && apt-get install -y cmake g++ git
            git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git
            cd whisper.cpp
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            mkdir -p /work/dist
            cp build/bin/whisper-cli /work/dist/whisper 2>/dev/null || cp build/bin/main /work/dist/whisper
            chmod +x /work/dist/whisper
          '
          tar -czvf whisper-linux-arm64.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-linux-arm64
          path: whisper-linux-arm64.tar.gz

  build-linux-armv7:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARMv7 container
        run: |
          docker run --rm --platform linux/arm/v7 -v $PWD:/work -w /work arm32v7/debian:bookworm bash -c '
            apt-get update && apt-get install -y cmake g++ git
            git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git
            cd whisper.cpp
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            mkdir -p /work/dist
            cp build/bin/whisper-cli /work/dist/whisper 2>/dev/null || cp build/bin/main /work/dist/whisper
            chmod +x /work/dist/whisper
          '
          tar -czvf whisper-linux-armv7.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-linux-armv7
          path: whisper-linux-armv7.tar.gz

  build-macos-arm64:
    runs-on: macos-14  # M1 runner
    steps:
      - name: Clone whisper.cpp
        run: git clone --depth 1 ${{ env.WHISPER_REPO }} whisper.cpp

      - name: Build whisper
        run: |
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package binary
        run: |
          mkdir -p dist
          cp whisper.cpp/build/bin/whisper-cli dist/whisper 2>/dev/null || cp whisper.cpp/build/bin/main dist/whisper
          chmod +x dist/whisper
          tar -czvf whisper-darwin-arm64.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-darwin-arm64
          path: whisper-darwin-arm64.tar.gz

  build-macos-x64:
    runs-on: macos-13  # Intel runner
    steps:
      - name: Clone whisper.cpp
        run: git clone --depth 1 ${{ env.WHISPER_REPO }} whisper.cpp

      - name: Build whisper
        run: |
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package binary
        run: |
          mkdir -p dist
          cp whisper.cpp/build/bin/whisper-cli dist/whisper 2>/dev/null || cp whisper.cpp/build/bin/main dist/whisper
          chmod +x dist/whisper
          tar -czvf whisper-darwin-amd64.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-darwin-amd64
          path: whisper-darwin-amd64.tar.gz

  create-release:
    needs: [build-linux-x64, build-linux-arm64, build-linux-armv7, build-macos-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: whisper-${{ steps.date.outputs.date }}
          name: Whisper Binaries ${{ steps.date.outputs.date }}
          body: |
            Pre-built whisper.cpp binaries for Crayfish voice recognition.

            These binaries are automatically built from the latest whisper.cpp source.

            ## Supported Platforms
            - `whisper-linux-amd64.tar.gz` - Linux x86_64 (servers, NUCs)
            - `whisper-linux-arm64.tar.gz` - Linux ARM64 (Pi 3/4/5 64-bit, Orange Pi)
            - `whisper-linux-armv7.tar.gz` - Linux ARMv7 (Pi 2, Pi 3 32-bit)
            - `whisper-darwin-arm64.tar.gz` - macOS Apple Silicon (M1/M2/M3)
            - `whisper-darwin-amd64.tar.gz` - macOS Intel

            ## Usage
            Crayfish automatically downloads the correct binary for your platform.
            No manual installation needed.
          files: |
            artifacts/whisper-linux-amd64/whisper-linux-amd64.tar.gz
            artifacts/whisper-linux-arm64/whisper-linux-arm64.tar.gz
            artifacts/whisper-linux-armv7/whisper-linux-armv7.tar.gz
            artifacts/whisper-darwin-arm64/whisper-darwin-arm64.tar.gz
            artifacts/whisper-darwin-amd64/whisper-darwin-amd64.tar.gz
          draft: false
          prerelease: false
