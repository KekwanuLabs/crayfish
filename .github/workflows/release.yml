name: Release

# Automatically build and release on every push to main.
# - Crayfish binaries: Built on every push
# - Whisper binaries: Only rebuilt when WHISPER_VERSION file changes

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_whisper:
        description: 'Force rebuild whisper binaries'
        required: false
        default: 'false'
        type: boolean

env:
  GO_VERSION: '1.26'

jobs:
  # Determine version and what to build
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bump: ${{ steps.version.outputs.bump }}
      rebuild_whisper: ${{ steps.whisper.outputs.rebuild }}
      whisper_version: ${{ steps.whisper.outputs.whisper_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tag lookup and commit analysis

      - name: Determine version
        id: version
        run: |
          # Find the latest semver tag (exclude 'latest' and pre-release tags)
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: ${LATEST_TAG}"

          # Get commit subjects since last tag for conventional commit analysis
          SUBJECTS=$(git log "${LATEST_TAG}..HEAD" --pretty="%s" --no-merges)
          echo "Commits since ${LATEST_TAG}:"
          echo "$SUBJECTS"

          # Determine bump type from conventional commits:
          #   major: breaking change  (feat!:, fix!:, or any type with !)
          #   minor: new feature      (feat:)
          #   patch: everything else  (fix:, docs:, refactor:, chore:, ci:, or no prefix)
          BUMP="patch"
          if echo "$SUBJECTS" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          # Parse current version components
          MAJOR=$(echo "${LATEST_TAG#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST_TAG#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST_TAG#v}" | cut -d. -f3)

          # Apply bump
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (${BUMP} bump from ${LATEST_TAG})"

      - name: Check if whisper rebuild needed
        id: whisper
        run: |
          # Read pinned whisper version
          WHISPER_VERSION=$(grep -v '^#' WHISPER_VERSION | tr -d '[:space:]')
          echo "whisper_version=${WHISPER_VERSION}" >> $GITHUB_OUTPUT
          echo "Whisper version: ${WHISPER_VERSION}"

          # Check if WHISPER_VERSION file changed in this commit
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "WHISPER_VERSION"; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "Whisper rebuild: WHISPER_VERSION changed"
          elif [ "${{ inputs.rebuild_whisper }}" == "true" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "Whisper rebuild: manual trigger"
          else
            # Check if whisper binaries exist in latest release
            WHISPER_ASSETS=$(gh release view latest --json assets -q '.assets[].name' 2>/dev/null || true)
            WHISPER_EXISTS=$(echo "$WHISPER_ASSETS" | grep -c "whisper-" || true)
            echo "Whisper assets found: ${WHISPER_EXISTS}"
            if [ "${WHISPER_EXISTS:-0}" -lt 1 ]; then
              echo "rebuild=true" >> $GITHUB_OUTPUT
              echo "Whisper rebuild: no existing binaries"
            else
              echo "rebuild=false" >> $GITHUB_OUTPUT
              echo "Whisper rebuild: skipped (no changes)"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Run tests before building — gate releases on passing tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Run vet
        run: go vet ./...

  # Build Crayfish binaries for all platforms
  build:
    needs: [prepare, test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: 7
            name: linux-armv7
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: 6
            name: linux-armv6
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: darwin-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"

          go build -ldflags "${LDFLAGS}" -o crayfish-${{ matrix.name }} ./cmd/crayfish
          tar -czvf crayfish-${{ matrix.name }}.tar.gz crayfish-${{ matrix.name }}
          chmod +x crayfish-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crayfish-${{ matrix.name }}
          path: |
            crayfish-${{ matrix.name }}
            crayfish-${{ matrix.name }}.tar.gz

  # Build whisper binaries (only when WHISPER_VERSION changes)
  build-whisper:
    needs: prepare
    if: needs.prepare.outputs.rebuild_whisper == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            docker: false
          - os: ubuntu-latest
            platform: linux-arm64
            docker: true
            docker_platform: linux/arm64
            docker_image: arm64v8/debian:bookworm
          - os: ubuntu-latest
            platform: linux-armv7
            docker: true
            docker_platform: linux/arm/v7
            docker_image: arm32v7/debian:bookworm
          - os: macos-latest
            platform: darwin-arm64
            docker: false
          - os: macos-latest
            platform: darwin-amd64
            docker: false

    runs-on: ${{ matrix.os }}
    env:
      WHISPER_VERSION: ${{ needs.prepare.outputs.whisper_version }}
    steps:
      - name: Set up QEMU (for ARM builds)
        if: matrix.docker
        uses: docker/setup-qemu-action@v3

      - name: Build whisper (native)
        if: "!matrix.docker"
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y cmake g++ git
          fi

          echo "Building whisper.cpp version: ${WHISPER_VERSION}"
          git clone --depth 1 --branch "${WHISPER_VERSION}" https://github.com/ggml-org/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

          mkdir -p ../dist
          cp build/bin/whisper-cli ../dist/whisper 2>/dev/null || cp build/bin/main ../dist/whisper
          chmod +x ../dist/whisper

      - name: Build whisper (Docker/ARM)
        if: matrix.docker
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -e WHISPER_VERSION="${WHISPER_VERSION}" \
            -v $PWD:/work -w /work ${{ matrix.docker_image }} bash -c '
            apt-get update && apt-get install -y cmake g++ git
            echo "Building whisper.cpp version: ${WHISPER_VERSION}"
            git clone --depth 1 --branch "${WHISPER_VERSION}" https://github.com/ggml-org/whisper.cpp.git
            cd whisper.cpp
            CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release"
            # armv7 needs -latomic for 64-bit atomics
            if [ "$(uname -m)" = "armv7l" ]; then
              CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_EXE_LINKER_FLAGS=-latomic -DCMAKE_SHARED_LINKER_FLAGS=-latomic"
            fi
            cmake -B build $CMAKE_ARGS
            cmake --build build -j$(nproc)
            mkdir -p /work/dist
            cp build/bin/whisper-cli /work/dist/whisper 2>/dev/null || cp build/bin/main /work/dist/whisper
            chmod +x /work/dist/whisper
          '

      - name: Package whisper
        run: tar -czvf whisper-${{ matrix.platform }}.tar.gz -C dist whisper

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-${{ matrix.platform }}
          path: whisper-${{ matrix.platform }}.tar.gz

  # Create GitHub release
  release:
    needs: [prepare, build, build-whisper]
    if: always() && needs.build.result == 'success' && (needs.build-whisper.result == 'success' || needs.build-whisper.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Download Crayfish artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: crayfish-*

      - name: Download Whisper artifacts (if built)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: whisper-*
        continue-on-error: true

      - name: Download existing whisper binaries (if not rebuilt)
        if: needs.prepare.outputs.rebuild_whisper != 'true'
        run: |
          mkdir -p artifacts/whisper-existing
          for platform in linux-amd64 linux-arm64 linux-armv7 darwin-arm64 darwin-amd64; do
            gh release download latest --pattern "whisper-${platform}.tar.gz" --dir artifacts/whisper-existing/ 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "crayfish-*" \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > SHA256SUMS.txt
          echo "Release contents:"
          ls -la

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag -d latest 2>/dev/null || true

          WHISPER_VERSION=$(grep -v '^#' WHISPER_VERSION | tr -d '[:space:]')

          gh release create latest \
            --title "Latest Build (${{ needs.prepare.outputs.version }})" \
            --notes "## Crayfish ${{ needs.prepare.outputs.version }}

          Accessible AI for everyone.

          ### Quick Install

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/KekwanuLabs/crayfish/main/scripts/install.sh | bash
          \`\`\`

          ### Downloads

          | Platform | Binary |
          |----------|--------|
          | Raspberry Pi 3/4/5 (64-bit) | crayfish-linux-arm64 |
          | Raspberry Pi 2 (32-bit) | crayfish-linux-armv7 |
          | Linux x86_64 | crayfish-linux-amd64 |
          | Mac Apple Silicon | crayfish-darwin-arm64 |
          | Mac Intel | crayfish-darwin-amd64 |

          **Whisper version:** ${WHISPER_VERSION}" \
            --latest \
            release/*

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          # Clean up if a release with this version already exists (e.g. from a partial prior run)
          gh release delete "${VERSION}" --yes 2>/dev/null || true
          git push origin ":refs/tags/${VERSION}" 2>/dev/null || true
          git tag -d "${VERSION}" 2>/dev/null || true

          # Find previous tag for changelog
          PREV_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Build changelog from commits since last tag
          CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty="- %s" --no-merges)

          gh release create "${VERSION}" \
            --title "Crayfish ${VERSION}" \
            --notes "## Crayfish ${VERSION}

          ### Changes

          ${CHANGELOG}

          See [installation instructions](https://github.com/KekwanuLabs/crayfish#installation)." \
            release/*
